name: ICM guard-main

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Block projects/ on main
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^projects/'; then
            echo "ERROR: projects/ data must never be committed to main."
            exit 1
          fi
